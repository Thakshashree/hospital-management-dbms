{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Dashboard</h2>
<div class="row">
    <div class="col-md-3">
        <div class="card stat-card bg-primary text-white mb-4">
            <div class="card-body">
                <h5 class="card-title">Total Patients</h5>
                <h3>{{ total_patients }}</h3>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card bg-success text-white mb-4">
            <div class="card-body">
                <h5 class="card-title">Today's Appointments</h5>
                <h3>{{ today_appointments }}</h3>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card bg-warning text-dark mb-4">
            <div class="card-body">
                <h5 class="card-title">Total Revenue</h5>
                <h3>${{ total_revenue }}</h3>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card bg-danger text-white mb-4">
            <div class="card-body">
                <h5 class="card-title">Available Rooms</h5>
                <h3>{{ available_rooms }}</h3>
            </div>
        </div>
    </div>
</div>
{% endblock %}
