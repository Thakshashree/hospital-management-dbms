<!DOCTYPE html>
<html>
<head>
    <title>Hospital Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Hospital Management</h1>
    
    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card text-white bg-primary">
                <div class="card-body">
                    <h5>Total Patients</h5>
                    <h2>{{ patient_count }}</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h5>Appointments Today</h5>
                    <h2>{{ today_appt }}</h2>
                </div>
            </div>
        </div>
    </div>

    <a href="/book" class="btn btn-dark mt-4">Book Appointment</a>
    <a href="/patients" class="btn btn-outline-dark mt-4">View Patients</a>

    <h3 class="mt-5">Doctors</h3>
    <table class="table table-striped">
        <tr><th>Name</th><th>Specialization</th></tr>
        {% for doc in doctors %}
        <tr><td>{{ doc.name }}</td><td>{{ doc.specialization }}</td></tr>
        {% endfor %}
    </table>
</div>
</body>
</html>
