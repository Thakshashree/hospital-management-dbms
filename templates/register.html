{% extends 'base.html' %}

{% block content %}
<style>
    /* Modern UI/UX Design */
    body {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        font-family: 'Inter', sans-serif;
    }
    .register-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 0;
    }
    .glass-panel {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        display: flex;
        flex-direction: row;
        max-width: 900px;
        width: 100%;
        transition: transform 0.3s ease;
    }
    .glass-panel:hover {
        transform: translateY(-5px);
    }
    .panel-left {
        background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        color: white;
        padding: 3rem;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }
    .panel-left h2 {
        font-weight: 700;
        font-size: 2.5rem;
        margin-bottom: 1rem;
    }
    .panel-right {
        padding: 3rem;
        flex: 1.5;
        background: white;
    }
    .form-control-custom {
        border-radius: 10px;
        border: 1px solid #e0e0e0;
        padding: 0.75rem 1rem;
        transition: all 0.3s;
    }
    .form-control-custom:focus {
        box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.3);
        border-color: #4facfe;
    }
    .btn-gradient {
        background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        border: none;
        color: white;
        border-radius: 10px;
        padding: 0.75rem;
        font-weight: 600;
        transition: all 0.3s;
    }
    .btn-gradient:hover {
        box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        transform: translateY(-2px);
    }
    .role-selector {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
    }
    .role-card {
        flex: 1;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        padding: 1rem;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
    }
    .role-card input {
        display: none;
    }
    .role-card:has(input:checked) {
        border-color: #4facfe;
        background: rgba(79, 172, 254, 0.05);
        color: #4facfe;
    }
    .role-card i {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
    }
</style>

<div class="container register-wrapper">
    <div class="glass-panel">
        <div class="panel-left d-none d-md-flex">
            <h2>Join HMS Pro</h2>
            <p class="lead">Experience the future of healthcare management. Create your account in seconds.</p>
            <i class="fas fa-heartbeat mt-4" style="font-size: 4rem; opacity: 0.8;"></i>
        </div>
        <div class="panel-right">
            <h3 class="mb-4 font-weight-bold" style="color: #333;">Create Account</h3>
            <form action="{{ url_for('auth.register') }}" method="POST">
                
                <div class="role-selector">
                    <label class="role-card">
                        <input type="radio" name="role" value="patient" checked>
                        <i class="fas fa-user-injured d-block"></i>
                        <span>Patient</span>
                    </label>
                    <label class="role-card">
                        <input type="radio" name="role" value="staff">
                        <i class="fas fa-user-md d-block"></i>
                        <span>Staff</span>
                    </label>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small font-weight-bold text-uppercase">Full Name</label>
                    <input type="text" name="name" class="form-control form-control-custom" placeholder="e.g. John Doe" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label text-muted small font-weight-bold text-uppercase">Email Address</label>
                    <input type="email" name="email" class="form-control form-control-custom" placeholder="name@example.com" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label text-muted small font-weight-bold text-uppercase">Password</label>
                    <input type="password" name="password" class="form-control form-control-custom" placeholder="Create a strong password" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-muted small font-weight-bold text-uppercase">Age</label>
                        <input type="number" name="age" class="form-control form-control-custom" placeholder="Years" min="1" max="150" required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label text-muted small font-weight-bold text-uppercase">Gender</label>
                        <select name="gender" class="form-select form-control-custom" required>
                            <option value="" disabled selected>Select...</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div id="staff-fields" style="display: none;">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small font-weight-bold text-uppercase">Staff Role</label>
                            <select name="staff_role" class="form-select form-control-custom">
                                <option value="" disabled selected>Select Role</option>
                                <option value="Doctor">Doctor</option>
                                <option value="Nurse">Nurse</option>
                                <option value="Pharmacist">Pharmacist</option>
                                <option value="Lab Technician">Lab Technician</option>
                                <option value="Admin">Admin</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small font-weight-bold text-uppercase">Department</label>
                            <select name="department" class="form-select form-control-custom">
                                <option value="" disabled selected>Select Dept</option>
                                <option value="Cardiology">Cardiology</option>
                                <option value="Neurology">Neurology</option>
                                <option value="Pediatrics">Pediatrics</option>
                                <option value="Orthopedics">Orthopedics</option>
                                <option value="ICU">ICU</option>
                                <option value="General">General</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small font-weight-bold text-uppercase">Staff ID</label>
                        <input type="text" name="staff_id" class="form-control form-control-custom" placeholder="e.g. EMP1234">
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-gradient btn-lg">Complete Registration</button>
                </div>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-muted mb-0">Already have an account? <a href="{{ url_for('auth.login') }}" style="color: #4facfe; font-weight: 600; text-decoration: none;">Sign In</a></p>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleStaffFields() {
        const staffFields = document.getElementById('staff-fields');
        const roleRadios = document.getElementsByName('role');
        let isStaff = false;
        
        for (let i = 0; i < roleRadios.length; i++) {
            if (roleRadios[i].checked && roleRadios[i].value === 'staff') {
                isStaff = true;
                break;
            }
        }
        
        if (isStaff) {
            staffFields.style.display = 'block';
            staffFields.querySelectorAll('select, input').forEach(el => el.setAttribute('required', ''));
        } else {
            staffFields.style.display = 'none';
            staffFields.querySelectorAll('select, input').forEach(el => el.removeAttribute('required'));
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const roleRadios = document.getElementsByName('role');
        for (let i = 0; i < roleRadios.length; i++) {
            roleRadios[i].addEventListener('change', toggleStaffFields);
        }
        toggleStaffFields();
    });
</script>
{% endblock %}
