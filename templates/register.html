{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-hero">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem;"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        <h1>HMS Pro</h1>
        <p>Join our modern healthcare platform.</p>
    </div>
    <div class="auth-form-container">
        <div class="glass-card">
            <h2>Create Account</h2>
            <form action="{{ url_for('auth.register') }}" method="POST">
                
                <div class="role-selection">
                    <label class="role-card">
                        <input type="radio" name="role" value="patient" checked>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <div>I'm a Patient</div>
                    </label>
                    <label class="role-card">
                        <input type="radio" name="role" value="staff">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                        <div>I'm Staff</div>
                    </label>
                </div>

                <div class="input-group">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" name="name" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <div class="input-group" style="flex: 1; margin-bottom: 0;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        <input type="number" name="age" placeholder="Age" min="1" max="150" required style="width: 100%;">
                    </div>
                    <div class="input-group" style="flex: 1; margin-bottom: 0;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <select name="gender" required style="width: 100%; border: none; background: transparent; outline: none; padding: 0.5rem; font-size: inherit; color: inherit; cursor: pointer;">
                            <option value="" disabled selected>Gender</option>
                            <option value="Male" style="color: black;">Male</option>
                            <option value="Female" style="color: black;">Female</option>
                            <option value="Other" style="color: black;">Other</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Register</button>
            </form>
            <div class="auth-links">
                <p>Already have an account? <a href="{{ url_for('auth.login') }}">Sign In</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
