{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Voice Booking Assistant</h2>
<div class="card mb-4 text-center p-5">
    <div class="card-body">
        <h3><i class="fas fa-microphone-alt"></i> Speak to Book</h3>
        <p class="text-muted">Say something like: "Book an appointment for Rahul Kumar with Dr. A Sharma tomorrow at 10 AM"</p>
        <button id="recordBtn" class="btn btn-primary btn-lg rounded-circle voice-btn mb-4" style="width: 100px; height: 100px;">
            <i class="fas fa-microphone fa-3x"></i>
        </button>
        <div id="transcript" class="mt-3 fs-5 font-italic text-secondary"></div>
        <div id="status" class="mt-3 fw-bold"></div>
    </div>
</div>

<script>
    const recordBtn = document.getElementById('recordBtn');
    const transcriptDiv = document.getElementById('transcript');
    const statusDiv = document.getElementById('status');
    
    let recognition;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        
        recognition.onstart = function() {
            recordBtn.classList.add('recording');
            statusDiv.innerHTML = "<span class='text-primary'>Listening...</span>";
            transcriptDiv.innerHTML = "";
        };
        
        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            transcriptDiv.innerHTML = '"' + transcript + '"';
            statusDiv.innerHTML = "<span class='text-warning'>Processing with Gemini AI...</span>";
            
            fetch("{{ url_for('appointment.voice_process') }}", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ transcript: transcript })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    statusDiv.innerHTML = "<span class='text-success'><i class='fas fa-check'></i> " + data.message + "</span>";
                    setTimeout(() => window.location.href = "{{ url_for('appointment.index') }}", 2000);
                } else {
                    statusDiv.innerHTML = "<span class='text-danger'>Error: " + data.error + "</span>";
                }
            })
            .catch(err => {
                statusDiv.innerHTML = "<span class='text-danger'>Error processing request.</span>";
            });
        };
        
        recognition.onerror = function(event) {
            statusDiv.innerHTML = "<span class='text-danger'>Speech recognition error.</span>";
        };
        
        recognition.onend = function() {
            recordBtn.classList.remove('recording');
        };
        
        recordBtn.onclick = function() {
            recognition.start();
        };
    } else {
        statusDiv.innerHTML = "<span class='text-danger'>Web Speech API is not supported in this browser.</span>";
    }
</script>
{% endblock %}
